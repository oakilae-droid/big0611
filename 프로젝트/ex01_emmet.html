<!-- 문서 타입: HTML5 -->
<!DOCTYPE html>
<html lang="ko">
<!-- 메타데이터? 데이터를 설명하는 데이터 -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!-- 부모>자식 -->
    <!-- div>ul>li -->
    <div>
        <ul>
            <li></li>
        </ul>
    </div>

    <!-- 형+제관계 -->
    <!-- div+p+span -->
    <div></div>
    <p></p>
    <span></span>

    <!-- 반복*횟수 -->
    <!-- ul>li*4 -->
    <ul>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>

    <!-- id와 class -->
    <!-- div#main -->
    <!-- #main -->
    <div id="main"></div>
    
    <!-- 클래스, 반복 -->
    <!-- .item*2 -->
    <div class="item"></div>
    <div class="item"></div>

    <!-- 자동 순번$, {내용} -->
     <!-- ul>li.list-$*3{메뉴 $} -->
    <ul>
        <li class="list-1">메뉴 1</li>
        <li class="list-2">메뉴 2</li>
        <li class="list-3">메뉴 3</li>
    </ul>

    

</body>
</html>
